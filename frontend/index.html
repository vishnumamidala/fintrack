<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title -->
    <title>Expense Tracker — Smart Finance Dashboard</title>

    <!-- SEO -->
    <meta
      name="description"
      content="Track expenses, visualize insights, and manage your finances with a premium Apple-style dashboard."
    />

    <!-- Theme Color -->
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Apple Font (SF Pro alternative) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Smooth Theme Init (NO FLASH) -->
    <script>
      (() => {
        try {
          const savedTheme = localStorage.getItem("expense-tracker-theme");
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;

          if (savedTheme === "dark" || (!savedTheme && prefersDark)) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>

    <!-- Global Styles (Apple feel) -->
    <style>
      :root {
        --bg-light: #f5f5f7;
        --bg-dark: #0a0a0a;
        --text-light: #1d1d1f;
        --text-dark: #f5f5f7;
        --glass: rgba(255, 255, 255, 0.1);
        --blur: blur(20px);
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg-light);
        color: var(--text-light);
        -webkit-font-smoothing: antialiased;
        transition: background 0.4s ease, color 0.4s ease;
      }

      .dark body {
        background: var(--bg-dark);
        color: var(--text-dark);
      }

      /* Smooth fade-in (Apple style) */
      #root {
        opacity: 0;
        animation: fadeIn 0.8s ease forwards;
      }

      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <!-- React Entry -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
